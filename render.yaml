services:
  - type: web
    name: yt-rip
    runtime: docker
    repo: https://github.com/Bo-Abe/yt-rip
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3001"
      - key: TEMP_DIR
        value: /app/tmp
      - key: DOWNLOAD_MODE
        value: local
      - key: TEMP_FILE_TTL_HOURS
        value: "2"
      - key: MAX_CONCURRENT_CONVERSIONS
        value: "2"
      - key: YTDLP_PATH
        value: /usr/local/bin/yt-dlp
      - key: FFMPEG_PATH
        value: /usr/bin/ffmpeg
